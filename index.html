<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duck Dash Runner</title>
  <style>
    :root {
      --hud-bg: rgba(10, 18, 24, 0.72);
      --hud-line: rgba(200, 230, 238, 0.28);
      --hud-text: #e7f5f8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1419;
      color: var(--hud-text);
      font-family: "Avenir Next", "Trebuchet MS", sans-serif;
    }

    #game-wrap {
      position: fixed;
      inset: 0;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, rgba(4, 8, 11, 0.84), rgba(12, 23, 30, 0.82));
    }

    .panel {
      width: min(760px, 92vw);
      background: rgba(10, 18, 24, 0.78);
      border: 1px solid var(--hud-line);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(5px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.3rem, 2.4vw, 2rem);
    }

    .small {
      font-size: 0.9rem;
      line-height: 1.45;
      color: #c0dce3;
    }

    button {
      margin-top: 12px;
      border: none;
      border-radius: 9px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(160deg, #9ce8ff, #59c8e7);
      color: #08232c;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #top {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--hud-bg);
      border: 1px solid var(--hud-line);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.88rem;
      line-height: 1.35;
      white-space: pre-line;
    }

    #msg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--hud-bg);
      border: 1px solid var(--hud-line);
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
      font-size: 0.95rem;
      display: none;
      max-width: 86vw;
    }

    #hatPicker {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: none;
      place-items: center;
      background: linear-gradient(160deg, rgba(4, 8, 11, 0.78), rgba(10, 19, 25, 0.76));
      pointer-events: auto;
    }

    #hatPicker .panel {
      width: min(760px, 92vw);
      text-align: center;
    }

    .hatChoices {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .hatBtn {
      margin: 0;
      width: 100%;
    }

    @media (max-width: 640px) {
      .hatChoices {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="game-wrap"></div>

  <div id="overlay">
    <div class="panel">
      <h1>Duck Dash</h1>
      <div class="small">
        You are the duck now. Run through the farm and jump over obstacles like the offline dino game.<br>
        Jump with <strong>Space</strong>, <strong>W</strong>, <strong>Up Arrow</strong>, mouse click, or tap.<br>
        Speed ramps up over time. Survive as long as possible.
      </div>
      <button id="startBtn">Start Runner</button>
    </div>
  </div>

  <div id="hud">
    <div id="top"></div>
    <div id="msg"></div>
  </div>

  <div id="hatPicker">
    <div class="panel">
      <h1>1 Minute Reward</h1>
      <div class="small">Pick a hat for your duck, then the run continues.</div>
      <div class="hatChoices">
        <button class="hatBtn" data-hat="hat_straw">Straw Hat</button>
        <button class="hatBtn" data-hat="hat_cap">Blue Cap</button>
        <button class="hatBtn" data-hat="hat_bow">Bowler</button>
        <button class="hatBtn" data-hat="hat_party">Party Hat</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    const BEST_KEY = "duck_dash_best_v1";

    const ui = {
      overlay: document.getElementById("overlay"),
      top: document.getElementById("top"),
      msg: document.getElementById("msg"),
      startBtn: document.getElementById("startBtn"),
      hatPicker: document.getElementById("hatPicker")
    };

    class DuckRunnerScene extends Phaser.Scene {
      constructor() {
        super("runner");
        this.worldWidth = 1800;
        this.worldHeight = 900;
        this.groundY = 760;
        this.baseSpeed = 350;
        this.speed = this.baseSpeed;
        this.distance = 0;
        this.best = Number(localStorage.getItem(BEST_KEY) || 0);
        this.spawnTimer = 0;
        this.nextSpawnSeconds = 3.2;
        this.clusterRemaining = 0;
        this.gameOver = false;
        this.gameStarted = false;
        this.countdownActive = false;
        this.countdownValue = 3;
        this.countdownTimer = 0;
        this.goTimer = 0;
        this.runSeconds = 0;
        this.choosingHat = false;
        this.hatUnlocked = false;
        this.selectedHat = null;
      }

      preload() {
        this.jumpSfx = new Audio("assets/sounds/quack.wav");
        this.hitSfx = new Audio("assets/sounds/hatch.wav");
        this.ambSfx = new Audio("assets/sounds/chirp.wav");
        this.musicSfx = new Audio("assets/sounds/music.wav");
        this.ambSfx.loop = true;
        this.musicSfx.loop = true;
        this.ambSfx.volume = 0.14;
        this.musicSfx.volume = 0.07;
      }

      sfx(name, volume = 0.2, rate = 1) {
        const source = name === "jump" ? this.jumpSfx : this.hitSfx;
        const clip = source.cloneNode();
        clip.volume = volume;
        clip.playbackRate = rate;
        clip.play().catch(() => {});
      }

      createTextures() {
        const g = this.make.graphics({ x: 0, y: 0, add: false });

        const drawDuck = (legY, wingTilt, key) => {
          g.clear();
          g.fillStyle(0xeabf46, 1);
          g.fillEllipse(34, 31, 68, 56);
          g.fillStyle(0xf4d56b, 1);
          g.fillEllipse(29, 24, 48, 34);
          g.fillStyle(0xdba93b, 0.8);
          g.fillEllipse(19, 36, 16, 12);

          g.save();
          g.translateCanvas(29, 33);
          g.rotateCanvas(wingTilt);
          g.fillStyle(0xf0c24e, 1);
          g.fillEllipse(0, 0, 24, 17);
          g.fillStyle(0xf7d56d, 0.9);
          g.fillEllipse(2, -2, 14, 9);
          g.restore();

          g.fillStyle(0xffe79a, 1);
          g.fillEllipse(53, 15, 28, 24);
          g.fillStyle(0xfbd7a0, 0.95);
          g.fillEllipse(55, 27, 17, 10);

          g.fillStyle(0x1f2b31, 1);
          g.fillCircle(59, 14, 4.2);
          g.fillStyle(0xffffff, 0.9);
          g.fillCircle(60, 13, 1.3);

          g.fillStyle(0xffa25b, 1);
          g.fillEllipse(68, 19, 16, 11);
          g.fillStyle(0xf07a44, 1);
          g.fillRect(62, 19, 12, 2);

          g.fillStyle(0xf38f47, 1);
          g.fillEllipse(28, legY, 12, 7);
          g.fillEllipse(45, legY - 1, 12, 7);

          g.generateTexture(key, 74, 58);
        };

        drawDuck(54, -0.14, "duck_run1");
        drawDuck(51, 0.11, "duck_run2");
        drawDuck(56, -0.04, "duck_jump");

        g.clear();
        g.fillStyle(0xcfb261, 1);
        g.fillRoundedRect(0, 0, 58, 52, 4);
        g.fillStyle(0xe4cb84, 1);
        g.fillRoundedRect(2, 2, 54, 18, 3);
        g.generateTexture("hay", 58, 52);

        g.clear();
        g.fillStyle(0x977452, 1);
        g.fillRoundedRect(0, 0, 48, 58, 4);
        g.fillStyle(0xbc9671, 1);
        g.fillRoundedRect(2, 2, 44, 20, 3);
        g.lineStyle(2, 0x7f5f42, 1);
        g.strokeRect(4, 4, 40, 50);
        g.generateTexture("crate", 48, 58);

        g.clear();
        g.fillStyle(0x6f8f58, 1);
        g.fillRect(0, 0, 20, 110);
        g.fillStyle(0x86a66a, 1);
        g.fillRect(2, 0, 16, 110);
        g.generateTexture("fencePost", 20, 110);

        g.clear();
        g.fillStyle(0xffffff, 0.86);
        g.fillCircle(24, 22, 18);
        g.fillCircle(42, 17, 14);
        g.fillCircle(58, 22, 17);
        g.fillEllipse(41, 30, 80, 26);
        g.generateTexture("cloud", 84, 50);

        // Repeating parallax strips for apparent forward movement.
        g.clear();
        g.fillStyle(0x84c3df, 1);
        g.fillRect(0, 0, 512, 220);
        g.fillStyle(0x6da7bc, 0.85);
        for (let i = 0; i < 9; i += 1) {
          g.fillEllipse(i * 64 + 20, 190, 120, 70);
        }
        g.generateTexture("bg_far", 512, 220);

        g.clear();
        g.fillStyle(0x6e9a79, 1);
        g.fillRect(0, 0, 512, 180);
        g.fillStyle(0x587d61, 1);
        for (let i = 0; i < 12; i += 1) {
          g.fillRect(i * 46 + 8, 46 + (i % 2) * 8, 18, 90);
          g.fillCircle(i * 46 + 17, 38 + (i % 2) * 8, 24);
        }
        g.generateTexture("bg_mid", 512, 180);

        g.clear();
        g.fillStyle(0x5f7f48, 1);
        g.fillRect(0, 0, 512, 120);
        g.fillStyle(0x4f6d3c, 1);
        g.fillRect(0, 86, 512, 34);
        g.fillStyle(0x6f9253, 0.45);
        g.fillRect(0, 14, 512, 22);
        g.fillStyle(0x77985a, 0.35);
        g.fillRect(0, 44, 512, 16);
        g.generateTexture("bg_near", 512, 120);

        g.clear();
        g.fillStyle(0x5d7c46, 1);
        g.fillRect(0, 0, 512, 28);
        g.fillStyle(0x729357, 0.75);
        g.fillRect(0, 0, 512, 8);
        g.fillStyle(0x67884f, 0.65);
        for (let i = 0; i < 20; i += 1) {
          g.fillRect(i * 28 + 4, 10, 12, 14);
        }
        g.generateTexture("bg_ground_top", 512, 28);

        g.clear();
        g.fillStyle(0x456338, 1);
        g.fillRect(0, 0, 512, 210);
        g.fillStyle(0x3b5630, 0.8);
        g.fillRect(0, 40, 512, 26);
        g.fillStyle(0x51743f, 0.42);
        g.fillRect(0, 88, 512, 28);
        g.generateTexture("bg_ground_base", 512, 210);

        g.clear();
        g.fillStyle(0x7f5238, 0.95);
        g.fillRect(0, 48, 120, 92);
        g.fillTriangle(0, 48, 60, 0, 120, 48);
        g.fillStyle(0x6f4630, 1);
        g.fillRect(42, 88, 34, 52);
        g.fillStyle(0x8f5f43, 0.88);
        g.fillRect(168, 62, 104, 78);
        g.fillTriangle(160, 62, 220, 20, 280, 62);
        g.fillStyle(0x7a4f38, 1);
        g.fillRect(206, 100, 24, 40);
        g.fillStyle(0x6b8a52, 0.6);
        g.fillRect(320, 112, 192, 28);
        g.generateTexture("bg_barn_strip", 512, 140);

        g.clear();
        g.fillStyle(0xdbbe7d, 1);
        g.fillEllipse(28, 22, 56, 14);
        g.fillStyle(0xcaa864, 1);
        g.fillRect(12, 4, 32, 18);
        g.fillStyle(0xe8d196, 0.8);
        g.fillRect(14, 6, 9, 14);
        g.generateTexture("hat_straw", 56, 30);

        g.clear();
        g.fillStyle(0x2f5b87, 1);
        g.fillRect(12, 9, 36, 15);
        g.fillStyle(0x264d75, 1);
        g.fillEllipse(30, 24, 48, 10);
        g.fillStyle(0x49709b, 0.8);
        g.fillRect(16, 11, 8, 9);
        g.generateTexture("hat_cap", 60, 32);

        g.clear();
        g.fillStyle(0x2c2d33, 1);
        g.fillRect(15, 3, 30, 18);
        g.fillStyle(0x1f2025, 1);
        g.fillEllipse(30, 22, 52, 12);
        g.fillStyle(0x3f4048, 0.75);
        g.fillRect(18, 5, 8, 12);
        g.generateTexture("hat_bow", 60, 34);

        g.clear();
        g.fillStyle(0xe05b54, 1);
        g.fillTriangle(30, 2, 54, 30, 6, 30);
        g.fillStyle(0xffef9d, 1);
        g.fillCircle(30, 1, 4);
        g.fillStyle(0x5dbd76, 1);
        g.fillRect(12, 28, 36, 4);
        g.generateTexture("hat_party", 60, 36);
      }

      createWorld() {
        this.physics.world.setBounds(0, 0, this.worldWidth, this.worldHeight);

        this.skyTop = this.add.rectangle(this.worldWidth / 2, 180, this.worldWidth, 360, 0x95d4ec).setScrollFactor(0.15).setDepth(-30);
        this.skyMid = this.add.rectangle(this.worldWidth / 2, 430, this.worldWidth, 400, 0x7ebecb).setScrollFactor(0.3).setDepth(-29);
        this.skyLow = this.add.rectangle(this.worldWidth / 2, 650, this.worldWidth, 360, 0x6aa588).setScrollFactor(0.55).setDepth(-28);

        // Screen-fixed parallax layers that move continuously.
        this.parallaxFar = this.add.tileSprite(this.scale.width * 0.5, 300, this.scale.width, 230, "bg_far")
          .setScrollFactor(0)
          .setDepth(-20);
        this.parallaxMid = this.add.tileSprite(this.scale.width * 0.5, 470, this.scale.width, 190, "bg_mid")
          .setScrollFactor(0)
          .setDepth(-19);
        this.parallaxNear = this.add.tileSprite(this.scale.width * 0.5, this.groundY - 42, this.scale.width, 130, "bg_near")
          .setScrollFactor(0)
          .setDepth(-18);

        this.clouds = [];
        for (let i = 0; i < 6; i += 1) {
          const c = this.add.image(200 + i * 260, Phaser.Math.Between(80, 210), "cloud");
          c.setScrollFactor(0);
          c.setDepth(-17);
          this.clouds.push(c);
        }

        this.barnStrip = this.add.tileSprite(this.scale.width * 0.5, this.groundY - 120, this.scale.width, 150, "bg_barn_strip")
          .setScrollFactor(0)
          .setDepth(-16);
        this.groundTop = this.add.tileSprite(this.scale.width * 0.5, this.groundY + 2, this.scale.width, 28, "bg_ground_top")
          .setScrollFactor(0)
          .setDepth(-15);
        this.groundBase = this.add.tileSprite(this.scale.width * 0.5, this.groundY + 116, this.scale.width, 210, "bg_ground_base")
          .setScrollFactor(0)
          .setDepth(-14);

        this.groundBody = this.add.rectangle(this.worldWidth / 2, this.groundY + 6, this.worldWidth, 18, 0x000000, 0.001);
        this.physics.add.existing(this.groundBody, true);

        this.scale.on("resize", (size) => {
          this.parallaxFar.setSize(size.width, 230).setPosition(size.width * 0.5, 300);
          this.parallaxMid.setSize(size.width, 190).setPosition(size.width * 0.5, 470);
          this.parallaxNear.setSize(size.width, 130).setPosition(size.width * 0.5, this.groundY - 42);
          this.barnStrip.setSize(size.width, 150).setPosition(size.width * 0.5, this.groundY - 120);
          this.groundTop.setSize(size.width, 28).setPosition(size.width * 0.5, this.groundY + 2);
          this.groundBase.setSize(size.width, 210).setPosition(size.width * 0.5, this.groundY + 116);
        });
      }

      createDuck() {
        this.duck = this.physics.add.sprite(180, this.groundY - 40, "duck_run1");
        this.duck.setCollideWorldBounds(true);
        this.duck.setBodySize(52, 44, true);
        this.duck.setBounce(0);
        this.duck.setMaxVelocity(1000, 980);

        this.physics.add.collider(this.duck, this.groundBody);

        this.duckHat = this.add.image(this.duck.x, this.duck.y - 34, "hat_straw");
        this.duckHat.setVisible(false);
        this.duckHat.setDepth(8);
      }

      createObstacles() {
        this.obstacles = this.physics.add.group({ allowGravity: false, immovable: true });
        this.physics.add.collider(this.obstacles, this.groundBody);
        this.physics.add.overlap(this.duck, this.obstacles, this.hitObstacle, null, this);
      }

      createInput() {
        this.keys = this.input.keyboard.addKeys({
          jump1: "SPACE",
          jump2: "UP",
          jump3: "W",
          restart1: "R",
          restart2: "ENTER"
        });

        this.input.on("pointerdown", () => {
          if (this.choosingHat) {
            return;
          }
          if (this.gameOver) {
            this.restartGame();
            return;
          }
          this.tryJump();
        });
      }

      create() {
        sceneRef = this;
        this.createTextures();
        this.createWorld();
        this.createDuck();
        this.createObstacles();
        this.createInput();

        this.cameras.main.setBounds(0, 0, this.worldWidth, this.worldHeight);
        this.cameras.main.startFollow(this.duck, true, 0.16, 0.16, -200, 90);

        this.ambSfx.play().catch(() => {});
        this.musicSfx.play().catch(() => {});

        this.beginCountdown();
        this.updateHud();
      }

      startRun() {
        this.gameStarted = true;
        this.countdownActive = false;
        ui.msg.style.display = "none";
      }

      openHatPicker() {
        if (this.hatUnlocked || this.choosingHat || this.gameOver) {
          return;
        }
        this.choosingHat = true;
        this.gameStarted = false;
        this.physics.world.pause();
        ui.hatPicker.style.display = "grid";
      }

      applyHatChoice(key) {
        this.selectedHat = key;
        this.hatUnlocked = true;
        this.choosingHat = false;
        this.duckHat.setTexture(key);
        this.duckHat.setVisible(true);
        ui.hatPicker.style.display = "none";
        this.physics.world.resume();
        this.gameStarted = true;
      }

      beginCountdown() {
        this.gameStarted = false;
        this.countdownActive = true;
        this.countdownValue = 3;
        this.countdownTimer = 0;
        this.goTimer = 0;
        ui.msg.style.display = "block";
        ui.msg.textContent = "3";
      }

      tryJump() {
        if (!this.gameStarted || this.countdownActive) {
          return;
        }

        const grounded = this.duck.body.blocked.down || this.duck.body.touching.down;
        if (!grounded) {
          return;
        }
        this.duck.setVelocityY(-765);
        this.duck.setScale(1.02, 0.94);
        this.sfx("jump", 0.18, 1.15 + Math.random() * 0.12);
      }

      spawnObstacle() {
        const choice = Math.random();
        const key = choice < 0.55 ? "hay" : "crate";
        const o = this.obstacles.create(this.duck.x + 900, this.groundY - 30, key);
        o.setData("passed", false);
        o.setBodySize(key === "hay" ? 52 : 42, key === "hay" ? 40 : 48, true);
        o.setImmovable(true);
        o.setVelocityX(-this.speed);
      }

      updateSpawnPattern(dt) {
        // Time-based pacing:
        // frequent ~3s jumps with occasional long ~10s dry spells.
        this.spawnTimer += dt;
        while (this.spawnTimer >= this.nextSpawnSeconds) {
          this.spawnTimer -= this.nextSpawnSeconds;
          this.spawnObstacle();

          const diff = Phaser.Math.Clamp(this.distance / 650, 0, 1);
          const clusterChance = 0.32 + diff * 0.3;
          const longGapChance = 0.3 - diff * 0.2;

          if (this.clusterRemaining > 0) {
            this.clusterRemaining -= 1;
            this.nextSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(2.6, 1.2, diff),
              Phaser.Math.Linear(3.8, 2.2, diff)
            );
            continue;
          }

          const roll = Math.random();
          if (roll < clusterChance) {
            // Start a 2-3 obstacle burst.
            this.clusterRemaining = Phaser.Math.Between(1, 2);
            this.nextSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(2.8, 1.35, diff),
              Phaser.Math.Linear(4.2, 2.6, diff)
            );
          } else if (roll < clusterChance + Math.max(0.08, longGapChance)) {
            // Long breathing room, sometimes close to 10 seconds.
            this.nextSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(8.5, 4.8, diff),
              Phaser.Math.Linear(11.2, 6.9, diff)
            );
          } else {
            // Normal spacing.
            this.nextSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(4.2, 2.2, diff),
              Phaser.Math.Linear(6.8, 4.2, diff)
            );
          }
        }
      }

      hitObstacle() {
        if (this.gameOver) {
          return;
        }

        // Lose hat on death; can earn a new one next run.
        this.hatUnlocked = false;
        this.selectedHat = null;
        this.choosingHat = false;
        if (this.duckHat) {
          this.duckHat.setVisible(false);
        }
        ui.hatPicker.style.display = "none";

        this.gameOver = true;
        this.gameStarted = false;
        this.obstacles.children.each((o) => o.setVelocityX(0));
        this.duck.setVelocityX(0);
        this.duck.setTint(0xcf786f);
        this.sfx("hit", 0.28, 0.85);

        if (this.distance > this.best) {
          this.best = Math.floor(this.distance);
          localStorage.setItem(BEST_KEY, String(this.best));
        }

        ui.msg.style.display = "block";
        ui.msg.textContent = `YOU DIED!\nScore: ${Math.floor(this.distance)}m | Best: ${this.best}m\nPress Space / R / Enter / Click to restart`;
      }

      restartGame() {
        this.gameOver = false;
        this.gameStarted = false;
        this.speed = this.baseSpeed;
        this.distance = 0;
        this.runSeconds = 0;
        this.spawnTimer = 0;
        this.nextSpawnSeconds = 3.2;
        this.clusterRemaining = 0;

        this.duck.clearTint();
        this.duck.setPosition(180, this.groundY - 40);
        this.duck.setVelocity(0, 0);
        this.duck.setScale(1, 1);

        this.obstacles.clear(true, true);
        this.beginCountdown();
        this.updateHud();
      }

      updateHud() {
        const fps = this.game.loop.actualFps || 0;
        ui.top.textContent = [
          `Duck Dash Runner`,
          `Distance: ${Math.floor(this.distance)}m`,
          `Best: ${this.best}m`,
          `Speed: ${Math.floor(this.speed)} px/s`,
          `FPS: ${fps.toFixed(0)}`
        ].join("\n");
      }

      updateSky(deltaMs) {
        const t = this.time.now * 0.00008;
        const dayMix = (Math.sin(t) + 1) * 0.5;
        const top = Phaser.Display.Color.Interpolate.ColorWithColor(
          new Phaser.Display.Color(88, 154, 184),
          new Phaser.Display.Color(155, 217, 239),
          100,
          Math.round(dayMix * 100)
        );
        const mid = Phaser.Display.Color.Interpolate.ColorWithColor(
          new Phaser.Display.Color(84, 137, 122),
          new Phaser.Display.Color(126, 190, 203),
          100,
          Math.round(dayMix * 100)
        );
        const low = Phaser.Display.Color.Interpolate.ColorWithColor(
          new Phaser.Display.Color(74, 110, 83),
          new Phaser.Display.Color(106, 165, 136),
          100,
          Math.round(dayMix * 100)
        );

        this.skyTop.fillColor = Phaser.Display.Color.GetColor(top.r, top.g, top.b);
        this.skyMid.fillColor = Phaser.Display.Color.GetColor(mid.r, mid.g, mid.b);
        this.skyLow.fillColor = Phaser.Display.Color.GetColor(low.r, low.g, low.b);

        const travelSpeed = this.gameStarted && !this.gameOver && !this.countdownActive ? this.speed : this.baseSpeed * 0.45;
        this.parallaxFar.tilePositionX += (travelSpeed * 0.02) * (deltaMs / 16.666);
        this.parallaxMid.tilePositionX += (travelSpeed * 0.036) * (deltaMs / 16.666);
        this.parallaxNear.tilePositionX += (travelSpeed * 0.06) * (deltaMs / 16.666);
        this.barnStrip.tilePositionX += (travelSpeed * 0.028) * (deltaMs / 16.666);
        this.groundTop.tilePositionX += (travelSpeed * 0.085) * (deltaMs / 16.666);
        this.groundBase.tilePositionX += (travelSpeed * 0.05) * (deltaMs / 16.666);

        this.clouds.forEach((c, idx) => {
          c.x -= (0.05 + idx * 0.008) * deltaMs;
          if (c.x < -120) {
            c.x = this.scale.width + 120;
            c.y = Phaser.Math.Between(75, 220);
          }
        });
      }

      update(_, deltaMs) {
        const dt = deltaMs / 1000;

        if (Phaser.Input.Keyboard.JustDown(this.keys.jump1) || Phaser.Input.Keyboard.JustDown(this.keys.jump2) || Phaser.Input.Keyboard.JustDown(this.keys.jump3)) {
          this.tryJump();
        }

        if (
          this.gameOver &&
          (
            Phaser.Input.Keyboard.JustDown(this.keys.restart1) ||
            Phaser.Input.Keyboard.JustDown(this.keys.restart2) ||
            Phaser.Input.Keyboard.JustDown(this.keys.jump1) ||
            Phaser.Input.Keyboard.JustDown(this.keys.jump2) ||
            Phaser.Input.Keyboard.JustDown(this.keys.jump3)
          )
        ) {
          this.restartGame();
        }

        this.updateSky(deltaMs);

        if (this.gameOver) {
          this.updateHud();
          return;
        }

        if (this.countdownActive) {
          this.countdownTimer += dt;
          if (this.countdownValue > 0 && this.countdownTimer >= 1) {
            this.countdownTimer -= 1;
            this.countdownValue -= 1;
            if (this.countdownValue > 0) {
              ui.msg.textContent = String(this.countdownValue);
            } else {
              ui.msg.textContent = "GO!";
            }
          }

          if (this.countdownValue <= 0) {
            this.goTimer += dt;
            if (this.goTimer >= 0.55) {
              this.startRun();
            }
          }

          this.updateHud();
          return;
        }

        if (this.choosingHat) {
          this.updateHud();
          return;
        }

        if (!this.gameStarted) {
          this.updateHud();
          return;
        }

        this.speed = Math.min(760, this.baseSpeed + this.distance * 0.32);
        this.distance += dt * (this.speed * 0.1);
        this.runSeconds += dt;

        if (!this.hatUnlocked && this.runSeconds >= 60) {
          this.openHatPicker();
          this.updateHud();
          return;
        }

        this.updateSpawnPattern(dt);

        this.obstacles.children.each((o) => {
          if (!o.active) {
            return;
          }
          o.setVelocityX(-this.speed);
          if (o.x < this.duck.x - 120 && !o.getData("passed")) {
            o.setData("passed", true);
            this.distance += 3;
          }
          if (o.x < this.cameras.main.scrollX - 240) {
            o.destroy();
          }
        });

        const grounded = this.duck.body.blocked.down || this.duck.body.touching.down;
        if (grounded) {
          const runFrame = Math.floor(this.time.now * 0.02) % 2 === 0 ? "duck_run1" : "duck_run2";
          this.duck.setTexture(runFrame);
          const squash = 1 + Math.sin(this.time.now * 0.025) * 0.018;
          this.duck.setScale(squash, 1 / squash);
        } else {
          this.duck.setTexture("duck_jump");
          this.duck.setScale(1.05, 0.9);
        }

        if (this.hatUnlocked && this.selectedHat) {
          this.duckHat.setVisible(true);
          this.duckHat.setPosition(this.duck.x + 3, this.duck.y - 34);
          this.duckHat.setFlipX(this.duck.flipX);
        } else {
          this.duckHat.setVisible(false);
        }

        this.updateHud();
      }
    }

    let sceneRef = null;

    function startGame() {
      if (typeof Phaser === "undefined") {
        ui.overlay.style.display = "grid";
        ui.overlay.querySelector(".small").innerHTML = "Phaser failed to load from CDN. Check your internet and reload.";
        return;
      }

      const config = {
        type: Phaser.AUTO,
        parent: "game-wrap",
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: "#0b1419",
        physics: {
          default: "arcade",
          arcade: {
            gravity: { y: 2300 },
            debug: false
          }
        },
        scale: {
          mode: Phaser.Scale.RESIZE,
          autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: [DuckRunnerScene]
      };

      new Phaser.Game(config);
    }

    document.querySelectorAll("#hatPicker [data-hat]").forEach((btn) => {
      btn.onclick = () => {
        if (!sceneRef) {
          return;
        }
        sceneRef.applyHatChoice(btn.dataset.hat);
      };
    });

    ui.startBtn.onclick = () => {
      ui.overlay.style.display = "none";
      startGame();
    };
  </script>
</body>
</html>
