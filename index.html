<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duck Dash Runner</title>
  <style>
    :root {
      --hud-bg: rgba(11, 20, 26, 0.76);
      --hud-line: rgba(214, 238, 221, 0.22);
      --hud-text: #edf8f4;
      --accent: #f8d87f;
      --accent-soft: #f7ecbb;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #324c4d 0%, #122129 48%, #091016 100%);
      color: var(--hud-text);
      font-family: "Avenir Next", "Trebuchet MS", sans-serif;
    }

    #game-wrap {
      position: fixed;
      inset: 0;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, rgba(4, 8, 11, 0.84), rgba(12, 23, 30, 0.82));
    }

    .panel {
      width: min(760px, 92vw);
      background:
        linear-gradient(180deg, rgba(20, 34, 32, 0.9), rgba(10, 18, 24, 0.84)),
        rgba(10, 18, 24, 0.78);
      border: 1px solid var(--hud-line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.3rem, 2.4vw, 2rem);
    }

    .small {
      font-size: 0.9rem;
      line-height: 1.45;
      color: #c0dce3;
    }

    button {
      margin-top: 12px;
      border: none;
      border-radius: 9px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(180deg, #ffe8aa, #e0bc61);
      color: #30200a;
      box-shadow: inset 0 1px 0 rgba(255, 252, 230, 0.52), 0 8px 18px rgba(65, 43, 8, 0.22);
    }

    button:hover {
      filter: brightness(1.02);
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #top {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--hud-bg);
      border: 1px solid var(--hud-line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.88rem;
      line-height: 1.35;
      white-space: pre-line;
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.22);
    }

    #prizes {
      position: absolute;
      right: 12px;
      bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: min(42vw, 420px);
    }

    .prizeChip {
      background: rgba(17, 31, 28, 0.82);
      border: 1px solid rgba(244, 232, 179, 0.24);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.8rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    #toast {
      position: absolute;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      background: rgba(22, 40, 35, 0.88);
      border: 1px solid rgba(250, 235, 184, 0.26);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.86rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      display: none;
    }

    #msg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--hud-bg);
      border: 1px solid var(--hud-line);
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
      font-size: 0.95rem;
      display: none;
      max-width: 86vw;
    }

    #hatPicker {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: none;
      place-items: center;
      background: linear-gradient(160deg, rgba(4, 8, 11, 0.78), rgba(10, 19, 25, 0.76));
      pointer-events: auto;
    }

    #hatPicker .panel {
      width: min(760px, 92vw);
      text-align: center;
    }

    .hatChoices {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .hatBtn {
      margin: 0;
      width: 100%;
    }

    @media (max-width: 640px) {
      .hatChoices {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="game-wrap"></div>

  <div id="overlay">
    <div class="panel">
      <h1>Duck Dash</h1>
      <div class="small">
        You are the duck now. Run through the farm and jump over obstacles like the offline dino game.<br>
        Jump with <strong>Space</strong>, <strong>W</strong>, <strong>Up Arrow</strong>, mouse click, or tap.<br>
        Speed ramps up over time. Survive as long as possible.
      </div>
      <button id="startBtn">Start Runner</button>
    </div>
  </div>

  <div id="hud">
    <div id="top"></div>
    <div id="msg"></div>
    <div id="toast"></div>
    <div id="prizes"></div>
  </div>

  <div id="hatPicker">
    <div class="panel">
      <h1 id="hatTitle">1 Minute Reward</h1>
      <div id="hatDesc" class="small">Pick a hat for your duck, then the run continues.</div>
      <div class="hatChoices">
        <button class="hatBtn" data-hat="hat_straw">Straw Hat</button>
        <button class="hatBtn" data-hat="hat_cap">Blue Cap</button>
        <button class="hatBtn" data-hat="hat_bow">Bowler</button>
        <button class="hatBtn" data-hat="hat_party">Party Hat</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    const BEST_KEY = "duck_dash_best_v1";

    const ui = {
      overlay: document.getElementById("overlay"),
      top: document.getElementById("top"),
      msg: document.getElementById("msg"),
      toast: document.getElementById("toast"),
      prizes: document.getElementById("prizes"),
      startBtn: document.getElementById("startBtn"),
      hatPicker: document.getElementById("hatPicker"),
      hatTitle: document.getElementById("hatTitle"),
      hatDesc: document.getElementById("hatDesc")
    };

    class DuckRunnerScene extends Phaser.Scene {
      constructor() {
        super("runner");
        this.worldWidth = 1800;
        this.worldHeight = 900;
        this.groundY = 760;
        this.baseSpeed = 350;
        this.speed = this.baseSpeed;
        this.distance = 0;
        this.best = Number(localStorage.getItem(BEST_KEY) || 0);
        this.spawnTimer = 0;
        this.nextSpawnSeconds = 3.2;
        this.clusterRemaining = 0;
        this.gameOver = false;
        this.gameStarted = false;
        this.countdownActive = false;
        this.countdownValue = 3;
        this.countdownTimer = 0;
        this.goTimer = 0;
        this.runSeconds = 0;
        this.choosingHatLevel = 0;
        this.hatLevel = 0;
        this.selectedHats = [];
        this.prizeCount = 0;
        this.collectedPrizes = [];
        this.spawnPrizeTimer = 0;
        this.nextPrizeSpawnSeconds = 4.4;
        this.toastTimer = 0;
      }

      preload() {
        this.jumpSfx = new Audio("assets/sounds/quack.wav");
        this.hitSfx = new Audio("assets/sounds/hatch.wav");
        this.ambSfx = new Audio("assets/sounds/chirp.wav");
        this.musicSfx = new Audio("assets/sounds/music.wav");
        this.ambSfx.loop = true;
        this.musicSfx.loop = true;
        this.ambSfx.volume = 0.14;
        this.musicSfx.volume = 0.07;
      }

      sfx(name, volume = 0.2, rate = 1) {
        const source = name === "jump" ? this.jumpSfx : this.hitSfx;
        const clip = source.cloneNode();
        clip.volume = volume;
        clip.playbackRate = rate;
        clip.play().catch(() => {});
      }

      createTextures() {
        const g = this.make.graphics({ x: 0, y: 0, add: false });

        const drawDuck = (frame) => {
          g.clear();

          const bodyY = frame === "run1" ? 54 : frame === "run2" ? 52 : 48;
          const headY = frame === "jump" ? 26 : frame === "run2" ? 28 : 30;
          const wingAngle = frame === "run1" ? -0.38 : frame === "run2" ? 0.12 : -0.12;
          const bodyLift = frame === "jump" ? -5 : 0;
          const eyeRadius = frame === "jump" ? 4.2 : 5;

          g.fillStyle(0x000000, 0.14);
          g.fillEllipse(56, 82, 74, 12);

          g.fillStyle(0x7d5c1d, 0.95);
          g.fillTriangle(16, bodyY + 5, 1, bodyY - 8, 10, bodyY + 10);
          g.fillTriangle(24, bodyY + 4, 10, bodyY - 10, 16, bodyY + 13);

          g.fillStyle(0x9b7422, 1);
          g.fillEllipse(55, bodyY + bodyLift, 76, 54);
          g.fillStyle(0xf1c957, 1);
          g.fillEllipse(55, bodyY - 2 + bodyLift, 72, 50);
          g.fillStyle(0xf7df8e, 1);
          g.fillEllipse(48, bodyY - 13 + bodyLift, 42, 25);
          g.fillStyle(0xe2b247, 0.92);
          g.fillEllipse(62, bodyY + 8 + bodyLift, 32, 18);
          g.fillStyle(0xffffff, 0.22);
          g.fillEllipse(41, bodyY - 18 + bodyLift, 20, 10);
          g.fillStyle(0xf0b18b, 0.18);
          g.fillEllipse(39, bodyY + 6 + bodyLift, 14, 8);

          g.save();
          g.translateCanvas(44, bodyY + 2 + bodyLift);
          g.rotateCanvas(wingAngle);
          g.fillStyle(0xa17723, 0.96);
          g.fillEllipse(0, 0, 28, 36);
          g.fillStyle(0xe5b748, 1);
          g.fillEllipse(0, -1, 24, 31);
          g.fillStyle(0xf6d974, 0.72);
          g.fillEllipse(2, -7, 13, 13);
          g.restore();

          g.fillStyle(0xf2cb5d, 1);
          g.fillEllipse(72, bodyY - 16 + bodyLift, 18, 24);

          g.fillStyle(0x9b7422, 1);
          g.fillCircle(83, headY, 22);
          g.fillStyle(0xf6d46d, 1);
          g.fillCircle(83, headY - 1, 19);
          g.fillStyle(0xf8edc2, 0.97);
          g.fillEllipse(84, headY + 10, 18, 11);
          g.fillStyle(0xffffff, 0.17);
          g.fillEllipse(76, headY - 10, 13, 8);
          g.fillStyle(0xf4bda2, 0.34);
          g.fillCircle(73, headY + 8, 5);

          g.fillStyle(0xf3c74d, 1);
          g.fillTriangle(77, headY - 18, 71, headY - 31, 81, headY - 20);
          g.fillTriangle(84, headY - 19, 80, headY - 30, 89, headY - 18);

          g.fillStyle(0x1a2119, 1);
          g.fillCircle(87, headY - 4, eyeRadius);
          g.fillStyle(0xffffff, 0.98);
          g.fillCircle(88, headY - 5, 1.5);
          g.fillStyle(0xc88f27, 0.42);
          g.fillEllipse(87, headY - 9, 8, 2);

          g.fillStyle(0x914f23, 0.32);
          g.lineStyle(2, 0x8a4f24, 0.28);
          g.beginPath();
          g.moveTo(86, headY + 7);
          g.lineTo(93, headY + 9);
          g.strokePath();

          g.fillStyle(0xf49b4a, 1);
          g.fillTriangle(95, headY + 3, 112, headY, 95, headY - 7);
          g.fillStyle(0xd97838, 1);
          g.fillRect(96, headY, 12, 2);
          g.fillStyle(0xffc577, 0.48);
          g.fillRect(97, headY - 4, 8, 2);

          if (frame === "jump") {
            g.lineStyle(3, 0xe58e37, 1);
            g.beginPath();
            g.moveTo(47, bodyY + 17);
            g.lineTo(40, 72);
            g.moveTo(61, bodyY + 16);
            g.lineTo(57, 70);
            g.strokePath();
            g.fillStyle(0xf0a34c, 1);
            g.fillEllipse(37, 73, 12, 5);
            g.fillEllipse(55, 71, 12, 5);
          } else {
            const leg1FootY = frame === "run1" ? 77 : 73;
            const leg2FootY = frame === "run2" ? 77 : 73;
            g.lineStyle(3, 0xe58e37, 1);
            g.beginPath();
            g.moveTo(47, bodyY + 16);
            g.lineTo(45, leg1FootY - 3);
            g.moveTo(61, bodyY + 15);
            g.lineTo(62, leg2FootY - 3);
            g.strokePath();
            g.fillStyle(0xf0a34c, 1);
            g.fillEllipse(43, leg1FootY, 13, 5);
            g.fillEllipse(64, leg2FootY, 13, 5);
          }

          g.generateTexture(`duck_${frame}`, 116, 90);
        };

        drawDuck("run1");
        drawDuck("run2");
        drawDuck("jump");

        g.clear();
        g.fillStyle(0xa27a3b, 0.18);
        g.fillEllipse(30, 56, 48, 8);
        g.fillStyle(0xc9a75e, 1);
        g.fillRoundedRect(0, 8, 58, 44, 6);
        g.fillStyle(0xe8d28f, 1);
        g.fillRoundedRect(4, 10, 50, 16, 5);
        g.fillStyle(0xb89250, 0.88);
        for (let i = 0; i < 8; i += 1) {
          g.fillRect(6 + i * 6, 30 + (i % 2), 3, 18);
        }
        g.generateTexture("hay", 58, 52);

        g.clear();
        g.fillStyle(0x553823, 0.18);
        g.fillEllipse(24, 61, 38, 7);
        g.fillStyle(0x94684a, 1);
        g.fillRoundedRect(0, 2, 48, 56, 5);
        g.fillStyle(0xbc9671, 1);
        g.fillRoundedRect(3, 5, 42, 16, 3);
        g.lineStyle(2, 0x7f5f42, 1);
        g.strokeRect(4, 4, 40, 50);
        g.lineStyle(3, 0x6c513a, 0.84);
        g.beginPath();
        g.moveTo(8, 12);
        g.lineTo(40, 46);
        g.moveTo(40, 12);
        g.lineTo(8, 46);
        g.strokePath();
        g.generateTexture("crate", 48, 58);

        g.clear();
        g.fillStyle(0x1e2018, 0.16);
        g.fillEllipse(18, 38, 22, 8);
        g.fillStyle(0xf0d279, 1);
        g.fillCircle(18, 18, 16);
        g.fillStyle(0xd8b559, 0.92);
        g.fillCircle(18, 18, 10);
        g.fillStyle(0xffffff, 0.9);
        g.fillCircle(18, 18, 4);
        g.generateTexture("prize_rosette", 36, 42);

        g.clear();
        g.fillStyle(0x1e2018, 0.16);
        g.fillEllipse(18, 40, 22, 8);
        g.fillStyle(0x69c9e8, 1);
        g.fillCircle(18, 16, 14);
        g.fillStyle(0xbef0ff, 0.85);
        g.fillCircle(14, 12, 5);
        g.fillStyle(0x2a7c98, 1);
        g.fillRect(14, 27, 8, 9);
        g.generateTexture("prize_feather", 36, 42);

        g.clear();
        g.fillStyle(0x1e2018, 0.16);
        g.fillEllipse(20, 42, 24, 8);
        g.fillStyle(0xe3b45e, 1);
        g.fillRect(9, 16, 22, 16);
        g.fillStyle(0xf6dd93, 1);
        g.fillEllipse(20, 15, 28, 10);
        g.fillStyle(0x9e6e38, 1);
        g.fillRect(16, 31, 8, 8);
        g.generateTexture("prize_cup", 40, 44);

        g.clear();
        g.fillStyle(0x6f8f58, 1);
        g.fillRect(0, 0, 20, 110);
        g.fillStyle(0x86a66a, 1);
        g.fillRect(2, 0, 16, 110);
        g.generateTexture("fencePost", 20, 110);

        g.clear();
        g.fillStyle(0x86adc0, 0.16);
        g.fillEllipse(52, 44, 88, 20);
        g.fillStyle(0xf7fbfd, 0.96);
        g.fillCircle(28, 24, 19);
        g.fillCircle(48, 18, 16);
        g.fillCircle(70, 23, 18);
        g.fillEllipse(49, 31, 88, 28);
        g.fillStyle(0xd9edf4, 0.66);
        g.fillEllipse(46, 34, 68, 14);
        g.generateTexture("cloud", 104, 60);

        g.clear();
        g.fillStyle(0xa6d2df, 0.32);
        for (let i = 0; i < 7; i += 1) {
          g.fillEllipse(i * 86 + 10, 198 - (i % 3) * 9, 180, 58);
        }
        g.fillStyle(0x87b8c3, 0.34);
        for (let i = 0; i < 6; i += 1) {
          g.fillEllipse(i * 96 + 30, 182 - (i % 2) * 7, 170, 52);
        }
        g.fillStyle(0x6f9fb0, 0.45);
        for (let i = 0; i < 7; i += 1) {
          g.fillEllipse(i * 82 + 24, 206 - (i % 2) * 8, 148, 40);
        }
        g.generateTexture("bg_far", 512, 220);

        g.clear();
        g.fillStyle(0x7fab7d, 0.95);
        for (let i = 0; i < 6; i += 1) {
          g.fillEllipse(i * 96 + 36, 170 - (i % 2) * 10, 190, 66);
        }
        g.fillStyle(0x58835e, 1);
        for (let i = 0; i < 12; i += 1) {
          const x = i * 44 + 6;
          const y = 58 + (i % 3) * 9;
          g.fillRect(x + 10, y + 42, 8, 52);
          g.fillCircle(x + 14, y + 16, 22);
          g.fillCircle(x + 3, y + 26, 16);
          g.fillCircle(x + 27, y + 26, 16);
          g.fillStyle(0x78aa7f, 0.58);
          g.fillCircle(x + 9, y + 11, 9);
          g.fillStyle(0x58835e, 1);
        }
        g.generateTexture("bg_mid", 512, 180);

        g.clear();
        g.fillStyle(0x6a8d59, 0.92);
        g.fillRect(0, 74, 512, 46);
        g.fillStyle(0x7ca96b, 0.78);
        for (let i = 0; i < 26; i += 1) {
          const x = i * 20;
          const bladeHeight = 26 + (i % 4) * 8;
          g.fillTriangle(x + 3, 108, x + 9, 108 - bladeHeight, x + 15, 108);
        }
        g.fillStyle(0xe7f3c8, 0.95);
        for (let i = 0; i < 10; i += 1) {
          const x = 24 + i * 52;
          const y = 82 + (i % 3) * 7;
          g.fillCircle(x, y, 3);
          g.fillCircle(x + 4, y + 3, 3);
          g.fillCircle(x - 4, y + 3, 3);
          g.fillStyle(0xf2c05a, 1);
          g.fillCircle(x, y + 3, 2);
          g.fillStyle(0xe7f3c8, 0.95);
        }
        g.fillStyle(0x607e4a, 0.94);
        g.fillRect(0, 106, 512, 14);
        g.generateTexture("bg_near", 512, 120);

        g.clear();
        g.fillStyle(0x775537, 1);
        g.fillRect(0, 17, 512, 18);
        g.fillRect(0, 40, 512, 18);
        g.fillStyle(0x8d6848, 1);
        for (let i = 0; i < 19; i += 1) {
          const x = i * 28 + 6;
          const postHeight = 44 + (i % 3) * 7;
          g.fillRect(x, 4, 8, postHeight);
          g.fillStyle(0xa17a57, 0.55);
          g.fillRect(x + 2, 6, 2, postHeight - 4);
          g.fillStyle(0x8d6848, 1);
        }
        g.generateTexture("bg_fence", 512, 70);

        g.clear();
        g.fillStyle(0x587842, 1);
        g.fillRect(0, 0, 512, 34);
        g.fillStyle(0x7aaa63, 0.82);
        for (let i = 0; i < 36; i += 1) {
          const x = i * 15;
          g.fillTriangle(x, 31, x + 4, 7 + (i % 4), x + 10, 31);
        }
        g.fillStyle(0xf2ddb0, 0.92);
        for (let i = 0; i < 8; i += 1) {
          const x = 22 + i * 64;
          const y = 16 + (i % 2) * 3;
          g.fillCircle(x, y, 3);
          g.fillCircle(x + 4, y + 3, 3);
          g.fillCircle(x - 4, y + 3, 3);
          g.fillStyle(0xe1a958, 1);
          g.fillCircle(x, y + 3, 1.6);
          g.fillStyle(0xf2ddb0, 0.92);
        }
        g.generateTexture("bg_ground_top", 512, 34);

        g.clear();
        g.fillStyle(0x446137, 1);
        g.fillRect(0, 0, 512, 210);
        g.fillStyle(0x35512d, 0.85);
        g.fillRect(0, 38, 512, 28);
        g.fillStyle(0x507542, 0.44);
        g.fillRect(0, 84, 512, 34);
        g.fillStyle(0x6d8e59, 0.12);
        g.fillRect(0, 2, 512, 26);
        g.fillStyle(0x2f4728, 0.55);
        for (let i = 0; i < 14; i += 1) {
          g.fillEllipse(i * 42 + 20, 144 + (i % 3) * 10, 22, 10);
        }
        g.generateTexture("bg_ground_base", 512, 210);

        g.clear();
        g.fillStyle(0x85a86c, 0.25);
        g.fillRect(0, 116, 512, 24);
        g.fillStyle(0x8f5f44, 0.97);
        g.fillRect(8, 50, 124, 80);
        g.fillTriangle(0, 50, 70, 8, 140, 50);
        g.fillStyle(0x6b4531, 1);
        g.fillRect(48, 84, 30, 46);
        g.fillStyle(0xe6d8c7, 0.85);
        g.fillRect(90, 62, 16, 16);
        g.fillStyle(0x9b684a, 1);
        g.fillRect(176, 56, 110, 74);
        g.fillTriangle(166, 56, 231, 18, 296, 56);
        g.fillStyle(0x774d38, 1);
        g.fillRect(219, 90, 24, 40);
        g.fillStyle(0xe0d1b8, 0.82);
        g.fillRect(188, 72, 14, 12);
        g.fillRect(259, 72, 14, 12);
        g.fillStyle(0x7c8f66, 0.74);
        g.fillEllipse(360, 118, 90, 32);
        g.fillStyle(0x6f8459, 0.88);
        g.fillRect(332, 74, 16, 56);
        g.fillCircle(340, 64, 26);
        g.fillCircle(324, 76, 18);
        g.fillCircle(356, 77, 18);
        g.fillStyle(0x8b6d4c, 0.9);
        g.fillRect(420, 30, 18, 100);
        g.fillStyle(0xd9d1bf, 0.86);
        g.fillRect(422, 34, 14, 74);
        g.fillStyle(0xb44e34, 0.9);
        g.fillEllipse(429, 28, 30, 18);
        g.generateTexture("bg_barn_strip", 512, 140);

        g.clear();
        g.fillStyle(0x6b8d58, 0.92);
        g.fillRect(0, 28, 512, 60);
        g.fillStyle(0x5e7d4d, 0.85);
        for (let i = 0; i < 7; i += 1) {
          g.fillRect(i * 84, 34 + (i % 2) * 5, 62, 46);
        }
        g.fillStyle(0x86a86d, 0.55);

      createWorld() {
        this.physics.world.setBounds(0, 0, this.worldWidth, this.worldHeight);

        this.skyTop = this.add.rectangle(this.worldWidth / 2, 180, this.worldWidth, 360, 0xa2d8ea).setScrollFactor(0.15).setDepth(-30);
        this.skyMid = this.add.rectangle(this.worldWidth / 2, 430, this.worldWidth, 400, 0x88c1c4).setScrollFactor(0.3).setDepth(-29);
        this.skyLow = this.add.rectangle(this.worldWidth / 2, 650, this.worldWidth, 360, 0x769d78).setScrollFactor(0.55).setDepth(-28);
        this.sunGlow = this.add.circle(this.scale.width - 180, 124, 74, 0xffefb1, 0.32).setScrollFactor(0).setDepth(-27);
        this.sunDisk = this.add.circle(this.scale.width - 180, 124, 34, 0xfff4cf, 0.92).setScrollFactor(0).setDepth(-26);
        this.horizonGlow = this.add.rectangle(this.scale.width * 0.5, 318, this.scale.width, 120, 0xffe1ad, 0.1).setScrollFactor(0).setDepth(-25);
        this.skyShade = this.add.rectangle(this.scale.width * 0.5, 110, this.scale.width, 220, 0x72b9d6, 0.14).setScrollFactor(0).setDepth(-24);

        // Screen-fixed parallax layers that move continuously.
        this.parallaxFar = this.add.tileSprite(this.scale.width * 0.5, 288, this.scale.width, 230, "bg_far")
          .setScrollFactor(0)
          .setDepth(-20);
        this.parallaxMid = this.add.tileSprite(this.scale.width * 0.5, 452, this.scale.width, 190, "bg_mid")
          .setScrollFactor(0)
          .setDepth(-19);
        this.parallaxNear = this.add.tileSprite(this.scale.width * 0.5, this.groundY - 76, this.scale.width, 130, "bg_near")
          .setScrollFactor(0)
          .setDepth(-18);

        this.clouds = [];
        for (let i = 0; i < 6; i += 1) {
          const c = this.add.image(200 + i * 260, Phaser.Math.Between(80, 210), "cloud");
          c.setScrollFactor(0);
          c.setDepth(-17);
          c.setScale(Phaser.Math.FloatBetween(0.88, 1.18));
          c.setAlpha(Phaser.Math.FloatBetween(0.74, 0.94));
          this.clouds.push(c);
        }

        this.barnStrip = this.add.tileSprite(this.scale.width * 0.5, this.groundY - 134, this.scale.width, 150, "bg_barn_strip")
          .setScrollFactor(0)
          .setDepth(-16);
        this.fieldRows = this.add.tileSprite(this.scale.width * 0.5, this.groundY - 74, this.scale.width, 88, "bg_field_rows")
          .setScrollFactor(0)
          .setDepth(-15.5);
        this.fenceStrip = this.add.tileSprite(this.scale.width * 0.5, this.groundY - 24, this.scale.width, 70, "bg_fence")
          .setScrollFactor(0)
          .setDepth(-15);
        this.groundTop = this.add.tileSprite(this.scale.width * 0.5, this.groundY + 5, this.scale.width, 34, "bg_ground_top")
          .setScrollFactor(0)
          .setDepth(-14);
        this.groundBase = this.add.tileSprite(this.scale.width * 0.5, this.groundY + 116, this.scale.width, 210, "bg_ground_base")
          .setScrollFactor(0)
          .setDepth(-13);

        this.groundBody = this.add.rectangle(this.worldWidth / 2, this.groundY + 6, this.worldWidth, 18, 0x000000, 0.001);
        this.physics.add.existing(this.groundBody, true);

        this.scale.on("resize", (size) => {
          this.sunGlow.setPosition(size.width - 180, 124);
          this.sunDisk.setPosition(size.width - 180, 124);
          this.horizonGlow.setSize(size.width, 120).setPosition(size.width * 0.5, 318);
          this.skyShade.setSize(size.width, 220).setPosition(size.width * 0.5, 110);
          this.parallaxFar.setSize(size.width, 230).setPosition(size.width * 0.5, 288);
          this.parallaxMid.setSize(size.width, 190).setPosition(size.width * 0.5, 452);
          this.parallaxNear.setSize(size.width, 130).setPosition(size.width * 0.5, this.groundY - 76);
          this.barnStrip.setSize(size.width, 150).setPosition(size.width * 0.5, this.groundY - 134);
          this.fieldRows.setSize(size.width, 88).setPosition(size.width * 0.5, this.groundY - 74);
          this.fenceStrip.setSize(size.width, 70).setPosition(size.width * 0.5, this.groundY - 24);
          this.groundTop.setSize(size.width, 34).setPosition(size.width * 0.5, this.groundY + 5);
          this.groundBase.setSize(size.width, 210).setPosition(size.width * 0.5, this.groundY + 116);
        });
      }

      createDuck() {
        this.duckShadow = this.add.ellipse(184, this.groundY + 8, 68, 18, 0x162011, 0.22).setDepth(3);
        this.duckBaseScale = 1.08;

        this.duck = this.physics.add.sprite(180, this.groundY - 50, "duck_run1");
        this.duck.setDepth(7);
        this.duck.setScale(this.duckBaseScale);
        this.duck.setCollideWorldBounds(true);
        this.duck.setBodySize(58, 46, true);
        this.duck.setBounce(0);
        this.duck.setMaxVelocity(1000, 980);

        this.physics.add.collider(this.duck, this.groundBody);

        this.duckHat = this.add.image(this.duck.x, this.duck.y - 45, "hat_straw");
        this.duckHat.setVisible(false);
        this.duckHat.setDepth(8);

        this.duckHatTop = this.add.image(this.duck.x, this.duck.y - 68, "hat_cap");
        this.duckHatTop.setVisible(false);
        this.duckHatTop.setScale(0.9);
        this.duckHatTop.setDepth(9);
      }

      createObstacles() {
        this.obstacles = this.physics.add.group({ allowGravity: false, immovable: true });
        this.physics.add.collider(this.obstacles, this.groundBody);
        this.physics.add.overlap(this.duck, this.obstacles, this.hitObstacle, null, this);
      }

      createPrizes() {
        this.prizes = this.physics.add.group({ allowGravity: false, immovable: true });
        this.physics.add.overlap(this.duck, this.prizes, this.collectPrize, null, this);
      }

      createInput() {
        this.keys = this.input.keyboard.addKeys({
          jump1: "SPACE",
          jump2: "UP",
          jump3: "W",
          restart1: "R",
          restart2: "ENTER"
        });

        this.input.on("pointerdown", () => {
          if (this.choosingHatLevel) {
            return;
          }
          if (this.gameOver) {
            this.restartGame();
            return;
          }
          this.tryJump();
        });
      }

      create() {
        sceneRef = this;
        this.createTextures();
        this.createWorld();
        this.createDuck();
        this.createObstacles();
        this.createPrizes();
        this.createInput();

        this.cameras.main.setBounds(0, 0, this.worldWidth, this.worldHeight);
        this.cameras.main.startFollow(this.duck, true, 0.16, 0.16, -200, 90);

        this.ambSfx.play().catch(() => {});
        this.musicSfx.play().catch(() => {});

        this.beginCountdown();
        this.updateHud();
      }

      startRun() {
        this.gameStarted = true;
        this.countdownActive = false;
        ui.msg.style.display = "none";
      }

      showToast(text, duration = 1.55) {
        ui.toast.textContent = text;
        ui.toast.style.display = "block";
        this.toastTimer = duration;
      }

      openHatPicker(level) {
        if (this.choosingHatLevel || this.gameOver) {
          return;
        }
        this.choosingHatLevel = level;
        this.gameStarted = false;
        this.physics.world.pause();
        ui.hatTitle.textContent = level === 1 ? "1 Minute Reward" : "2 Minute Reward";
        ui.hatDesc.textContent = level === 1
          ? "Pick the first hat for your duck, then the run continues."
          : "Stack a second hat on top. Pick one and keep running.";
        ui.hatPicker.style.display = "grid";
      }

      applyHatChoice(key) {
        if (!this.choosingHatLevel) {
          return;
        }

        const slot = this.choosingHatLevel - 1;
        this.selectedHats[slot] = key;
        this.hatLevel = Math.max(this.hatLevel, this.choosingHatLevel);
        this.choosingHatLevel = 0;

        this.duckHat.setVisible(Boolean(this.selectedHats[0]));
        if (this.selectedHats[0]) {
          this.duckHat.setTexture(this.selectedHats[0]);
        }
        this.duckHatTop.setVisible(Boolean(this.selectedHats[1]));
        if (this.selectedHats[1]) {
          this.duckHatTop.setTexture(this.selectedHats[1]);
        }
        ui.hatPicker.style.display = "none";
        this.physics.world.resume();
        this.gameStarted = true;
        this.showToast(slot === 0 ? "First hat equipped." : "Second hat stacked.");
      }

      spawnPrize() {
        const prizeDefs = [
          { key: "prize_rosette", label: "Ribbon", value: 1 },
          { key: "prize_feather", label: "Feather Charm", value: 1 },
          { key: "prize_cup", label: "Tiny Trophy", value: 2 }
        ];
        const def = Phaser.Utils.Array.GetRandom(prizeDefs);
        const prize = this.prizes.create(
          this.duck.x + 940,
          this.groundY - Phaser.Math.Between(80, 158),
          def.key
        );
        prize.setData("label", def.label);
        prize.setData("value", def.value);
        prize.setDepth(6);
        prize.setBodySize(24, 24, true);
        prize.setVelocityX(-this.speed);
      }

      updatePrizePattern(dt) {
        this.spawnPrizeTimer += dt;
        while (this.spawnPrizeTimer >= this.nextPrizeSpawnSeconds) {
          this.spawnPrizeTimer -= this.nextPrizeSpawnSeconds;
          this.spawnPrize();

          const diff = Phaser.Math.Clamp(this.distance / 800, 0, 1);
          if (Math.random() < 0.26 + diff * 0.16) {
            this.nextPrizeSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(2.8, 2.1, diff),
              Phaser.Math.Linear(4.2, 3.0, diff)
            );
          } else {
            this.nextPrizeSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(4.8, 3.0, diff),
              Phaser.Math.Linear(7.6, 5.2, diff)
            );
          }
        }
      }

      collectPrize(_, prize) {
        if (!prize.active) {
          return;
        }

        const label = prize.getData("label");
        const value = prize.getData("value");
        prize.destroy();

        this.prizeCount += value;
        this.distance += value * 2;
        this.collectedPrizes.unshift(label);
        this.collectedPrizes = this.collectedPrizes.slice(0, 4);
        this.sfx("jump", 0.08, 1.45);
        this.showToast(`${label} collected.`);
      }

      prettyHatName(key) {
        const names = {
          hat_straw: "Straw Hat",
          hat_cap: "Blue Cap",
          hat_bow: "Bowler",
          hat_party: "Party Hat"
        };
        return names[key] || key;
      }

      beginCountdown() {
        this.gameStarted = false;
        this.countdownActive = true;
        this.countdownValue = 3;
        this.countdownTimer = 0;
        this.goTimer = 0;
        ui.msg.style.display = "block";
        ui.msg.textContent = "3";
      }

      tryJump() {
        if (!this.gameStarted || this.countdownActive) {
          return;
        }

        const grounded = this.duck.body.blocked.down || this.duck.body.touching.down;
        if (!grounded) {
          return;
        }
        this.duck.setVelocityY(-765);
        this.duck.setScale(this.duckBaseScale * 1.02, this.duckBaseScale * 0.94);
        this.sfx("jump", 0.18, 1.15 + Math.random() * 0.12);
      }

      spawnObstacle() {
        const choice = Math.random();
        const key = choice < 0.55 ? "hay" : "crate";
        const o = this.obstacles.create(this.duck.x + 900, this.groundY - 30, key);
        o.setData("passed", false);
        o.setBodySize(key === "hay" ? 52 : 42, key === "hay" ? 40 : 48, true);
        o.setImmovable(true);
        o.setVelocityX(-this.speed);
        o.setDepth(6);
      }

      updateSpawnPattern(dt) {
        // Time-based pacing:
        // frequent ~3s jumps with occasional long ~10s dry spells.
        this.spawnTimer += dt;
        while (this.spawnTimer >= this.nextSpawnSeconds) {
          this.spawnTimer -= this.nextSpawnSeconds;
          this.spawnObstacle();

          const diff = Phaser.Math.Clamp(this.distance / 650, 0, 1);
          const clusterChance = 0.32 + diff * 0.3;
          const longGapChance = 0.3 - diff * 0.2;

          if (this.clusterRemaining > 0) {
            this.clusterRemaining -= 1;
            this.nextSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(2.6, 1.2, diff),
              Phaser.Math.Linear(3.8, 2.2, diff)
            );
            continue;
          }

          const roll = Math.random();
          if (roll < clusterChance) {
            // Start a 2-3 obstacle burst.
            this.clusterRemaining = Phaser.Math.Between(1, 2);
            this.nextSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(2.8, 1.35, diff),
              Phaser.Math.Linear(4.2, 2.6, diff)
            );
          } else if (roll < clusterChance + Math.max(0.08, longGapChance)) {
            // Long breathing room, sometimes close to 10 seconds.
            this.nextSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(8.5, 4.8, diff),
              Phaser.Math.Linear(11.2, 6.9, diff)
            );
          } else {
            // Normal spacing.
            this.nextSpawnSeconds = Phaser.Math.FloatBetween(
              Phaser.Math.Linear(4.2, 2.2, diff),
              Phaser.Math.Linear(6.8, 4.2, diff)
            );
          }
        }
      }

      hitObstacle() {
        if (this.gameOver) {
          return;
        }

        // Lose hat on death; can earn a new one next run.
        this.hatLevel = 0;
        this.selectedHats = [];
        this.choosingHatLevel = 0;
        if (this.duckHat) {
          this.duckHat.setVisible(false);
        }
        if (this.duckHatTop) {
          this.duckHatTop.setVisible(false);
        }
        ui.hatPicker.style.display = "none";
        ui.toast.style.display = "none";

        this.gameOver = true;
        this.gameStarted = false;
        this.obstacles.children.each((o) => o.setVelocityX(0));
        this.prizes.children.each((p) => p.setVelocityX(0));
        this.duck.setVelocityX(0);
        this.duck.setTint(0xcf786f);
        this.sfx("hit", 0.28, 0.85);

        if (this.distance > this.best) {
          this.best = Math.floor(this.distance);
          localStorage.setItem(BEST_KEY, String(this.best));
        }

        ui.msg.style.display = "block";
        ui.msg.textContent = `YOU DIED!\nScore: ${Math.floor(this.distance)}m | Best: ${this.best}m\nPress Space / R / Enter / Click to restart`;
      }

      restartGame() {
        this.gameOver = false;
        this.gameStarted = false;
        this.physics.world.resume();
        this.speed = this.baseSpeed;
        this.distance = 0;
        this.runSeconds = 0;
        this.prizeCount = 0;
        this.collectedPrizes = [];
        this.spawnTimer = 0;
        this.nextSpawnSeconds = 3.2;
        this.clusterRemaining = 0;
        this.spawnPrizeTimer = 0;
        this.nextPrizeSpawnSeconds = 4.4;
        this.hatLevel = 0;
        this.selectedHats = [];
        this.choosingHatLevel = 0;
        this.toastTimer = 0;
        ui.toast.style.display = "none";
        ui.hatPicker.style.display = "none";

        this.duck.clearTint();
        this.duck.setPosition(180, this.groundY - 50);
        this.duck.setVelocity(0, 0);
        this.duck.setScale(this.duckBaseScale, this.duckBaseScale);
        this.duckHat.setVisible(false);
        this.duckHatTop.setVisible(false);

        this.obstacles.clear(true, true);
        this.prizes.clear(true, true);
        this.beginCountdown();
        this.updateHud();
      }

      updateHud() {
        const fps = this.game.loop.actualFps || 0;
        ui.top.textContent = [
          `Duck Dash Runner`,
          `Distance: ${Math.floor(this.distance)}m`,
          `Best: ${this.best}m`,
          `Prizes: ${this.prizeCount}`,
          `Speed: ${Math.floor(this.speed)} px/s`,
          `FPS: ${fps.toFixed(0)}`
        ].join("\n");

        const prizeMarkup = [];
        if (this.selectedHats[0]) {
          prizeMarkup.push(`<div class="prizeChip">Hat 1: ${this.prettyHatName(this.selectedHats[0])}</div>`);
        }
        if (this.selectedHats[1]) {
          prizeMarkup.push(`<div class="prizeChip">Hat 2: ${this.prettyHatName(this.selectedHats[1])}</div>`);
        }
        prizeMarkup.push(`<div class="prizeChip">Prize Count: ${this.prizeCount}</div>`);
        this.collectedPrizes.forEach((name) => {
          prizeMarkup.push(`<div class="prizeChip">${name}</div>`);
        });
        ui.prizes.innerHTML = prizeMarkup.join("");
      }

      updateSky(deltaMs) {
        const t = this.time.now * 0.00008;
        const dayMix = (Math.sin(t) + 1) * 0.5;
        const top = Phaser.Display.Color.Interpolate.ColorWithColor(
          new Phaser.Display.Color(88, 154, 184),
          new Phaser.Display.Color(155, 217, 239),
          100,
          Math.round(dayMix * 100)
        );
        const mid = Phaser.Display.Color.Interpolate.ColorWithColor(
          new Phaser.Display.Color(84, 137, 122),
          new Phaser.Display.Color(126, 190, 203),
          100,
          Math.round(dayMix * 100)
        );
        const low = Phaser.Display.Color.Interpolate.ColorWithColor(
          new Phaser.Display.Color(74, 110, 83),
          new Phaser.Display.Color(106, 165, 136),
          100,
          Math.round(dayMix * 100)
        );

        this.skyTop.fillColor = Phaser.Display.Color.GetColor(top.r, top.g, top.b);
        this.skyMid.fillColor = Phaser.Display.Color.GetColor(mid.r, mid.g, mid.b);
        this.skyLow.fillColor = Phaser.Display.Color.GetColor(low.r, low.g, low.b);
        this.sunGlow.alpha = 0.22 + dayMix * 0.22;
        this.sunDisk.alpha = 0.72 + dayMix * 0.18;
        this.horizonGlow.alpha = 0.07 + dayMix * 0.08;
        this.skyShade.alpha = 0.09 + (1 - dayMix) * 0.06;

        const travelSpeed = this.gameStarted && !this.gameOver && !this.countdownActive ? this.speed : this.baseSpeed * 0.45;
        this.parallaxFar.tilePositionX += (travelSpeed * 0.018) * (deltaMs / 16.666);
        this.parallaxMid.tilePositionX += (travelSpeed * 0.03) * (deltaMs / 16.666);
        this.parallaxNear.tilePositionX += (travelSpeed * 0.05) * (deltaMs / 16.666);
        this.barnStrip.tilePositionX += (travelSpeed * 0.038) * (deltaMs / 16.666);
        this.fieldRows.tilePositionX += (travelSpeed * 0.056) * (deltaMs / 16.666);
        this.fenceStrip.tilePositionX += (travelSpeed * 0.088) * (deltaMs / 16.666);
        this.groundTop.tilePositionX += (travelSpeed * 0.11) * (deltaMs / 16.666);
        this.groundBase.tilePositionX += (travelSpeed * 0.062) * (deltaMs / 16.666);

        this.clouds.forEach((c, idx) => {
          c.x -= (0.042 + idx * 0.007) * deltaMs;
          if (c.x < -120) {
            c.x = this.scale.width + 120;
            c.y = Phaser.Math.Between(75, 220);
          }
        });
      }

      update(_, deltaMs) {
        const dt = deltaMs / 1000;

        if (this.toastTimer > 0) {
          this.toastTimer -= dt;
          if (this.toastTimer <= 0) {
            ui.toast.style.display = "none";
          }
        }

        if (Phaser.Input.Keyboard.JustDown(this.keys.jump1) || Phaser.Input.Keyboard.JustDown(this.keys.jump2) || Phaser.Input.Keyboard.JustDown(this.keys.jump3)) {
          this.tryJump();
        }

        if (
          this.gameOver &&
          (
            Phaser.Input.Keyboard.JustDown(this.keys.restart1) ||
            Phaser.Input.Keyboard.JustDown(this.keys.restart2) ||
            Phaser.Input.Keyboard.JustDown(this.keys.jump1) ||
            Phaser.Input.Keyboard.JustDown(this.keys.jump2) ||
            Phaser.Input.Keyboard.JustDown(this.keys.jump3)
          )
        ) {
          this.restartGame();
        }

        this.updateSky(deltaMs);

        if (this.gameOver) {
          this.updateHud();
          return;
        }

        if (this.countdownActive) {
          this.countdownTimer += dt;
          if (this.countdownValue > 0 && this.countdownTimer >= 1) {
            this.countdownTimer -= 1;
            this.countdownValue -= 1;
            if (this.countdownValue > 0) {
              ui.msg.textContent = String(this.countdownValue);
            } else {
              ui.msg.textContent = "GO!";
            }
          }

          if (this.countdownValue <= 0) {
            this.goTimer += dt;
            if (this.goTimer >= 0.55) {
              this.startRun();
            }
          }

          this.updateHud();
          return;
        }

        if (this.choosingHatLevel) {
          this.updateHud();
          return;
        }

        if (!this.gameStarted) {
          this.updateHud();
          return;
        }

        this.speed = Math.min(760, this.baseSpeed + this.distance * 0.32);
        this.distance += dt * (this.speed * 0.1);
        this.runSeconds += dt;

        if (this.hatLevel < 1 && this.runSeconds >= 60) {
          this.openHatPicker(1);
          this.updateHud();
          return;
        }

        if (this.hatLevel < 2 && this.runSeconds >= 120) {
          this.openHatPicker(2);
          this.updateHud();
          return;
        }

        this.updateSpawnPattern(dt);
        this.updatePrizePattern(dt);

        this.obstacles.children.each((o) => {
          if (!o.active) {
            return;
          }
          o.setVelocityX(-this.speed);
          if (o.x < this.duck.x - 120 && !o.getData("passed")) {
            o.setData("passed", true);
            this.distance += 3;
          }
          if (o.x < this.cameras.main.scrollX - 240) {
            o.destroy();
          }
        });

        this.prizes.children.each((p) => {
          if (!p.active) {
            return;
          }
          p.setVelocityX(-this.speed);
          p.y += Math.sin((this.time.now + p.x) * 0.008) * 0.22;
          if (p.x < this.cameras.main.scrollX - 240) {
            p.destroy();
          }
        });

        const grounded = this.duck.body.blocked.down || this.duck.body.touching.down;
        if (grounded) {
          const runFrame = Math.floor(this.time.now * 0.02) % 2 === 0 ? "duck_run1" : "duck_run2";
          this.duck.setTexture(runFrame);
          const squash = 1 + Math.sin(this.time.now * 0.025) * 0.018;
          this.duck.setScale(this.duckBaseScale * squash, this.duckBaseScale * (1 / squash));
        } else {
          this.duck.setTexture("duck_jump");
          this.duck.setScale(this.duckBaseScale * 1.05, this.duckBaseScale * 0.9);
        }

        const heightLift = Phaser.Math.Clamp((this.groundY - this.duck.y) * 0.18, 0, 18);
        this.duckShadow.setPosition(this.duck.x + 4, this.groundY + 9);
        this.duckShadow.setScale(1 - heightLift * 0.02, 1 - heightLift * 0.03);
        this.duckShadow.setAlpha(0.24 - heightLift * 0.007);

        if (this.selectedHats[0]) {
          this.duckHat.setVisible(true);
          this.duckHat.setPosition(this.duck.x + 8, this.duck.y - 48);
          this.duckHat.setFlipX(this.duck.flipX);
        } else {
          this.duckHat.setVisible(false);
        }

        if (this.selectedHats[1]) {
          this.duckHatTop.setVisible(true);
          this.duckHatTop.setPosition(this.duck.x + 8, this.duck.y - 69);
          this.duckHatTop.setFlipX(this.duck.flipX);
        } else {
          this.duckHatTop.setVisible(false);
        }

        this.updateHud();
      }
    }

    let sceneRef = null;
    let gameRef = null;

    window.__duckDash = {
      getState() {
        if (!sceneRef) {
          return null;
        }
        return {
          gameStarted: sceneRef.gameStarted,
          countdownActive: sceneRef.countdownActive,
          gameOver: sceneRef.gameOver,
          runSeconds: sceneRef.runSeconds,
          hatLevel: sceneRef.hatLevel,
          selectedHats: [...sceneRef.selectedHats],
          prizeCount: sceneRef.prizeCount,
          pickerVisible: ui.hatPicker.style.display !== "none",
          toastVisible: ui.toast.style.display !== "none"
        };
      },
      startNow() {
        if (!sceneRef) {
          return false;
        }
        sceneRef.countdownActive = false;
        sceneRef.countdownTimer = 0;
        sceneRef.countdownValue = 0;
        sceneRef.goTimer = 0;
        sceneRef.startRun();
        return true;
      },
      forceSeconds(seconds) {
        if (!sceneRef) {
          return false;
        }
        sceneRef.runSeconds = seconds;
        return true;
      },
      chooseHat(key) {
        if (!sceneRef) {
          return false;
        }
        sceneRef.applyHatChoice(key);
        return true;
      },
      spawnPrizeNow() {
        if (!sceneRef) {
          return false;
        }
        sceneRef.spawnPrize();
        return true;
      },
      collectFirstPrize() {
        if (!sceneRef || !sceneRef.prizes) {
          return false;
        }
        const firstPrize = sceneRef.prizes.getChildren().find((child) => child.active);
        if (!firstPrize) {
          return false;
        }
        sceneRef.collectPrize(sceneRef.duck, firstPrize);
        return true;
      },
      scene() {
        return sceneRef;
      },
      game() {
        return gameRef;
      }
    };

    function startGame() {
      if (typeof Phaser === "undefined") {
        ui.overlay.style.display = "grid";
        ui.overlay.querySelector(".small").innerHTML = "Phaser failed to load from CDN. Check your internet and reload.";
        return;
      }

      const config = {
        type: Phaser.AUTO,
        parent: "game-wrap",
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: "#0b1419",
        physics: {
          default: "arcade",
          arcade: {
            gravity: { y: 2300 },
            debug: false
          }
        },
        scale: {
          mode: Phaser.Scale.RESIZE,
          autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: [DuckRunnerScene]
      };

      gameRef = new Phaser.Game(config);
    }

    document.querySelectorAll("#hatPicker [data-hat]").forEach((btn) => {
      btn.onclick = () => {
        if (!sceneRef) {
          return;
        }
        sceneRef.applyHatChoice(btn.dataset.hat);
      };
    });

    ui.startBtn.onclick = () => {
      ui.overlay.style.display = "none";
      startGame();
    };
  </script>
</body>
</html>
